<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draftillery — Sign In</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #faf8f2; min-height:100vh;
  display:flex; align-items:center; justify-content:center;
}
body::before { content:''; position:fixed; top:0; left:0; right:0; height:3px; background:#4a6fa5; }
.card { background:#fff; border:1px solid #e4e0d6; padding:40px; width:100%; max-width:400px; }
.logo { font-family:Georgia,serif; font-size:22px; color:#2c2c2c; margin-bottom:4px; }
.sub { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:#bbb; margin-bottom:32px; }
.tabs { display:flex; gap:0; margin-bottom:28px; border-bottom:1px solid #e4e0d6; }
.tab {
  flex:1; padding:10px; text-align:center; font-size:11px; text-transform:uppercase;
  letter-spacing:1px; color:#999; cursor:pointer; border-bottom:2px solid transparent;
  margin-bottom:-1px; transition:all 0.15s;
}
.tab.active { color:#4a6fa5; border-bottom-color:#4a6fa5; font-weight:700; }
label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#999; margin-bottom:6px; font-weight:600; }
input {
  width:100%; padding:10px 14px; border:1px solid #e4e0d6; background:#fff;
  font-size:13px; color:#2c2c2c; border-radius:3px; outline:none;
  margin-bottom:16px; transition:border-color 0.2s; font-family:inherit;
}
input:focus { border-color:#4a6fa5; }
.btn {
  width:100%; padding:11px; background:#4a6fa5; color:#fff; border:none;
  border-radius:3px; font-size:12px; font-weight:600; letter-spacing:0.5px;
  cursor:pointer; transition:background 0.15s; font-family:inherit; margin-top:4px;
}
.btn:hover { background:#3d5f8f; }
.btn:disabled { opacity:0.6; cursor:not-allowed; }
.msg { font-size:12px; margin-top:14px; padding:10px 12px; border-radius:3px; display:none; }
.msg.error { color:#c04040; background:#fdf0f0; border:1px solid #f5c6c6; }
.msg.success { color:#3a6e3a; background:#f0faf0; border:1px solid #b8ddb8; }
.form { display:none; }
.form.active { display:block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Draftillery</div>
  <div class="sub">Reply outreach dashboard</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="form active" id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')submitLogin()">
    <button class="btn" id="loginBtn" onclick="submitLogin()">Sign In</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTER FORM -->
  <div class="form" id="registerForm">
    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Your name">
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="regPass" placeholder="Min 6 characters"
      onkeydown="if(event.key==='Enter')submitRegister()">
    <button class="btn" id="regBtn" onclick="submitRegister()">Create Account</button>
    <div class="msg" id="regMsg"></div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(function(t,i){ t.classList.toggle("active", (tab==="login"?i===0:i===1)); });
  document.getElementById("loginForm").classList.toggle("active", tab==="login");
  document.getElementById("registerForm").classList.toggle("active", tab==="register");
}

function showMsg(id, msg, type) {
  var el = document.getElementById(id);
  el.textContent = msg; el.className = "msg " + type; el.style.display = "block";
}

async function submitLogin() {
  var email = document.getElementById("loginEmail").value.trim();
  var pass  = document.getElementById("loginPass").value;
  var btn   = document.getElementById("loginBtn");
  if (!email || !pass) return showMsg("loginMsg", "Please fill in all fields.", "error");
  btn.disabled = true; btn.textContent = "Signing in…";
  try {
    var res = await fetch("/api/auth/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password: pass })
    });
    var data = await res.json();
    if (!res.ok) { showMsg("loginMsg", data.error || "Invalid email or password.", "error"); btn.disabled=false; btn.textContent="Sign In"; return; }
    localStorage.setItem("amp_token", data.access_token);
    window.location.href = "/";
  } catch(e) {
    showMsg("loginMsg", "Server error. Try again.", "error");
    btn.disabled=false; btn.textContent="Sign In";
  }
}

async function submitRegister() {
  var name  = document.getElementById("regName").value.trim();
  var email = document.getElementById("regEmail").value.trim();
  var pass  = document.getElementById("regPass").value;
  var btn   = document.getElementById("regBtn");
  if (!name || !email || !pass) return showMsg("regMsg", "Please fill in all fields.", "error");
  if (pass.length < 6) return showMsg("regMsg", "Password must be at least 6 characters.", "error");
  btn.disabled=true; btn.textContent="Creating account…";
  try {
    var res = await fetch("/api/auth/register", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password: pass, name })
    });
    var data = await res.json();
    if (!res.ok) { showMsg("regMsg", data.error || "Registration failed.", "error"); btn.disabled=false; btn.textContent="Create Account"; return; }
    showMsg("regMsg", "Account created! Signing you in…", "success");
    localStorage.setItem("amp_token", data.access_token);
    setTimeout(function(){ window.location.href = "/"; }, 1000);
  } catch(e) {
    showMsg("regMsg", "Server error. Try again.", "error");
    btn.disabled=false; btn.textContent="Create Account";
  }
}

// Already logged in? Go to dashboard
if (localStorage.getItem("amp_token")) window.location.href = "/";
</script>
</body>
</html>
